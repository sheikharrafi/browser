name: Build Desktop Installers

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Cancel any in-progress run for the same ref (branch/tag/PR) when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: new-project

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: new-project/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build installers
        run: npm run dist
        env:
          # Avoid macOS code-signing attempts for unsigned local installers.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # electron-builder uses this token only if it tries to publish; harmless otherwise.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            new-project/release/*.exe
            new-project/release/*.dmg
            new-project/release/*.AppImage
            new-project/release/*.zip
            new-project/release/*.blockmap
            new-project/release/latest*.yml

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only run for tag pushes matching v*
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
