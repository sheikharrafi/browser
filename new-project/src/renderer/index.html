<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FeatureRichBrowser</title>
    <style>
      /* Chrome-অভিন্ন (hubhu) ডার্ক-থিম UI শেল স্টাইল।
         UI শেল উইন্ডোর উপরের ~৮৮px দখল করে; নিচের অংশে BrowserView পেজ রেন্ডার করে। */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-user-select: none;
        user-select: none;
      }
      :root {
        --chrome-bg: #202124;
        --chrome-toolbar: #35363a;
        --tab-active: #35363a;
        --tab-inactive: #292a2d;
        --text: #e8eaed;
        --text-dim: #9aa0a6;
        --omnibox-bg: #202124;
        --accent: #8ab4f8;
        --divider: #3c4043;
      }
      html,
      body,
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }
      body {
        font-family: 'Segoe UI', system-ui, Roboto, Arial, sans-serif;
        background: var(--chrome-bg);
        color: var(--text);
        font-size: 13px;
      }
      #root {
        display: flex;
        flex-direction: column;
      }

      /* ট্যাব বার */
      .tabbar {
        display: flex;
        align-items: flex-end;
        height: 40px;
        background: var(--chrome-bg);
        padding: 6px 6px 0 6px;
        gap: 2px;
        overflow-x: auto;
      }
      .tabbar::-webkit-scrollbar {
        height: 0;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 120px;
        max-width: 220px;
        height: 34px;
        padding: 0 10px;
        background: var(--tab-inactive);
        border-radius: 9px 9px 0 0;
        cursor: default;
        color: var(--text-dim);
        flex: 0 1 auto;
      }
      .tab.active {
        background: var(--tab-active);
        color: var(--text);
      }
      .tab .favicon {
        width: 16px;
        height: 16px;
        flex: 0 0 16px;
        border-radius: 3px;
        background: #5f6368;
        object-fit: contain;
      }
      .tab .title {
        flex: 1 1 auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 12px;
      }
      .tab .close {
        flex: 0 0 18px;
        width: 18px;
        height: 18px;
        line-height: 16px;
        text-align: center;
        border-radius: 50%;
        font-size: 14px;
        color: var(--text-dim);
      }
      .tab .close:hover {
        background: #5f6368;
        color: #fff;
      }
      .newtab {
        flex: 0 0 28px;
        width: 28px;
        height: 28px;
        margin-bottom: 3px;
        border-radius: 50%;
        text-align: center;
        line-height: 28px;
        font-size: 18px;
        color: var(--text-dim);
        cursor: default;
      }
      .newtab:hover {
        background: var(--chrome-toolbar);
        color: var(--text);
      }

      /* টুলবার */
      .toolbar {
        display: flex;
        align-items: center;
        height: 48px;
        background: var(--chrome-toolbar);
        padding: 0 8px;
        gap: 4px;
      }
      .tbtn {
        flex: 0 0 32px;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        text-align: center;
        line-height: 32px;
        font-size: 17px;
        color: var(--text);
        cursor: default;
      }
      .tbtn:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .tbtn.disabled {
        color: #5f6368;
        pointer-events: none;
      }
      .omnibox {
        flex: 1 1 auto;
        height: 32px;
        margin: 0 8px;
        background: var(--omnibox-bg);
        border-radius: 16px;
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 8px;
      }
      .omnibox input {
        flex: 1 1 auto;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 13px;
        -webkit-user-select: text;
        user-select: text;
      }
      .omnibox .lock {
        color: var(--text-dim);
        font-size: 12px;
      }

      /* প্যানেল (বুকমার্ক / ইতিহাস / ডাউনলোড) */
      .panel {
        position: absolute;
        top: 88px;
        right: 0;
        width: 380px;
        max-height: calc(100% - 88px);
        background: #292a2d;
        border-left: 1px solid var(--divider);
        box-shadow: -2px 2px 12px rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        z-index: 10;
      }
      .panel h3 {
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 500;
        border-bottom: 1px solid var(--divider);
      }
      .panel .list {
        overflow-y: auto;
        flex: 1 1 auto;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .row:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .row .meta {
        flex: 1 1 auto;
        overflow: hidden;
      }
      .row .meta .t {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .row .meta .u {
        color: var(--text-dim);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .row .act {
        color: var(--text-dim);
        font-size: 13px;
        cursor: default;
      }
      .row .act:hover {
        color: #fff;
      }
      .empty {
        padding: 24px 16px;
        color: var(--text-dim);
        text-align: center;
      }
      .searchbox {
        padding: 8px 12px;
        border-bottom: 1px solid var(--divider);
      }
      .searchbox input {
        width: 100%;
        height: 30px;
        background: var(--omnibox-bg);
        border: 1px solid var(--divider);
        border-radius: 6px;
        color: var(--text);
        padding: 0 10px;
        outline: none;
        -webkit-user-select: text;
        user-select: text;
      }
      .progress {
        height: 4px;
        background: #3c4043;
        border-radius: 2px;
        margin-top: 4px;
        overflow: hidden;
      }
      .progress > div {
        height: 100%;
        background: var(--accent);
      }

      /* ওভারফ্লো মেনু */
      .menu {
        position: absolute;
        top: 84px;
        right: 8px;
        background: #292a2d;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        padding: 6px 0;
        z-index: 20;
        min-width: 200px;
      }
      .menu .item {
        padding: 9px 18px;
        cursor: default;
      }
      .menu .item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./renderer.js"></script>
  </body>
</html>
